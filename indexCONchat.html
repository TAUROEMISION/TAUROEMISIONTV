<!DOCTYPE html>
<html lang="es">

<head>
    <!-- TU HEAD COMPLETO, SIN CAMBIOS -->
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff6600">
    <link rel="manifest" href="/manifest.json">
    <title>TAUROEMISION LIVE</title>

    <!-- FIREBASE SDK - CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- TU CSS COMPLETO + CHAT MEJORADO -->
    <style>
        /* TU CSS EXISTENTE SIN CAMBIOS */
        :root {
            --naranja: #ff6600;
            --fondo: #0a0a0a;
            --panel: rgba(30, 30, 30, 0.95);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--fondo);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .contenedor {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .area-video {
            flex-grow: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .marca-agua {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(250, 97, 3, 0.643);
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }

        .contador-srs {
            position: absolute;
            top: 47px;
            left: 110px;
            background: rgba(255, 102, 0, 0.9);
            color: white;
            padding: 3px 6px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 10;
            animation: pulso 1.5s infinite;
        }

        .panel-clips {
            width: 300px;
            background: var(--panel);
            border-left: 2px solid var(--naranja);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .panel-oculto {
            transform: translateX(100%);
            position: absolute;
            right: 0;
            height: 100%;
        }

        .titulo {
            padding: 20px;
            background: var(--naranja);
            color: white;
            font-weight: bold;
            text-align: center;
        }

        #lista-clips {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .card {
            background: #252525;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--naranja);
        }

        .btn-x {
            width: 100%;
            background: var(--naranja);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-audio {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--naranja);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        #visor-repes {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
        }

        #visor-repes video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cerrar-repe {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--naranja);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 10001;
        }

        .tirador {
            position: absolute;
            right: 300px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--naranja);
            color: white;
            border: none;
            padding: 15px 8px;
            border-radius: 5px 0 0 5px;
            cursor: pointer;
            transition: right 0.3s ease;
        }

        .panel-oculto-tirador {
            right: 0;
        }

        /* 🔥 AÑADE ESTO AL FINAL DE TU CSS */
        .cargando-epico {
            color: #ff6600;
            font-size: 7rem !important;
            font-weight: 900;
            text-align: center;
            padding: 77px;
            animation: girar 2s infinite;
            text-shadow: 0 0 20px #ff6600;
        }

        @keyframes girar {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .live-counter {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(255, 102, 0, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 10000;
            animation: pulso 1.5s infinite;
        }

        @keyframes pulso {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        /* 🔥 SIN BARRAS - FULLSCREEN TOTAL */
        :-webkit-full-screen #visor-repes,
        :-webkit-full-screen #video-pepe {
            width: 100vw !important;
            height: 100vh !important;
        }

        video:-webkit-full-screen {
            object-fit: contain;
        }

        /* 🔥 ANDROID SIN 3 BOTONES - FULL IMMERSIVE */
        html,
        body {
            height: 100% !important;
            overflow: hidden !important;
            touch-action: none;
        }

        #visor-repes:-webkit-full-screen,
        #visor-repes:fullscreen {
            height: 100vh !important;
            width: 100vw !important;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            }

            50% {
                transform: scale(1.08);
                box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
            }
        }

        .btn-audio#btnChat {
            top: 302px;
            margin-left: 10px;
            background: linear-gradient(45deg, #00cc00, #00ff00);
            /* VERDE ON */
            box-shadow: 0 4px 12px rgba(0, 204, 0, 0.4);
            transition: all 0.3s;
        }

        .btn-audio#btnChat.cerrado {
            top: 302px;
            background: linear-gradient(45deg, #cc0000, #ff0000) !important;
            /* ROJO OFF */
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.4) !important;
        }

        .btn-audio#btnChat:hover {
            transform: scale(1.1);
        }

        /* 🔥 CHAT NUEVO: ABAJO IZQUIERDA, LETRAS GRANDES, TRANSPARENTE */
        #chat-container {
            position: fixed;
            bottom: 20px;
            /* ABAJO */
            left: 20px;
            /* IZQUIERDA */
            width: 360px;
            max-height: 55vh;
            background: rgba(0, 0, 0, 0.1);
            /* SUSPIRO */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 102, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            z-index: 12000;
            font-family: Arial;
        }

        #btnChat {
            position: fixed;
            bottom: 90px;
            left: 25px;
            background: linear-gradient(45deg, #00cc00, #00ff00);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            z-index: 12001;
            box-shadow: 0 4px 15px rgba(0, 204, 0, 0.4);
            transition: all 0.3s;
        }

        #btnChat:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 204, 0, 0.6);
        }

        #chat-form input,
        #chat-form textarea {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 102, 0, 0.4) !important;
            color: white !important;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            font-size: 18px;
            /* LETRAS GRANDES */
            width: 100%;
            box-sizing: border-box;
        }

        #chatUl {
            max-height: 45vh;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 10px;
            list-style: none;
            padding: 0;
        }

        #chatUl li {
            background: rgba(255, 102, 0, 0.2);
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #ff6600;
            font-size: 20px;
            /* LETRAS MUY GRANDES */
            line-height: 1.4;
            word-wrap: break-word;
        }

        #chatUl::-webkit-scrollbar {
            width: 6px;
        }

        #chatUl::-webkit-scrollbar-thumb {
            background: #ff6600;
            border-radius: 3px;
        }

        #btnEnviar {
            background: linear-gradient(45deg, #ff6600, #ff8800);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }

        #btnEnviar:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.5);
        }
    </style>
</head>

<body>
    <!-- TU HTML EXISTENTE -->
    <button class="btn-audio" onclick="gestionarAudio()" id="btnParlante">🔈</button>

    <!-- BOTÓN VERDE CHAT (NUEVO) -->
    <button id="btnChat" onclick="toggleChat()">💬</button>

    <!-- TU AUDIO, VIDEO, PANEL, ETC. SIN CAMBIOS -->
    <audio id="audio-directo-python">
        <source src="/audio_directo" type="audio/wav">
    </audio>

    <div id="visor-repes">
        <button class="cerrar-repe" onclick="cerrarPepe()">VOLVER AL DIRECTO ↩</button>
        <video id="video-pepe" controls autoplay></video>
    </div>

    <div class="contenedor">
        <div class="area-video">
            <div class="marca-agua">TAUROEMISION LIVE</div>
            <span id="contador-srs" class="contador-srs">2</span>
            <img id="stream-img" src="/solo_directo"
                style="width: 100%; height: 100%; object-fit: cover; background: #000;">
        </div>
        <div id="panel" class="panel-clips panel-oculto">
            <div class="titulo">MOMENTOS ORO</div>
            <div id="lista-clips">⏳ CARGANDO...</div>
        </div>
        <button id="btn-tira" class="tirador panel-oculto-tirador" onclick="toggle()">▶</button>
    </div>

    <!-- 🔥 CHAT CONTAINER ABAJO IZQUIERDA -->
    <div id="chat-container" style="display: none;">
        <div id="chat-form">
            <input type="text" id="nombre" placeholder="Tu nombre" maxlength="20">
            <textarea id="mensaje" placeholder="Escribe tu mensaje..." maxlength="200" rows="2"></textarea>
            <button id="btnEnviar">🔥 ENVIAR</button>
        </div>
        <ul id="chatUl"></ul>
    </div>

    <!-- TU SCRIPT EXISTENTE + FIREBASE -->
    <script>
        // 🔥 TU CÓDIGO EXISTENTE (audio, clips, fullscreen, etc.)
        const audioMotor = document.getElementById('audio-directo-python');
        const visorRepes = document.getElementById('visor-repes');
        const videoPepe = document.getElementById('video-pepe');
        const btnParlante = document.getElementById('btnParlante');
        // ... resto de tus funciones existentes ...

        function gestionarAudio() {
            if (audioMotor.paused) {
                audioMotor.load();
                audioMotor.play().then(() => {
                    btnParlante.innerHTML = "🔊";
                    btnParlante.style.background = "#00ff00";
                }).catch(e => console.log("Error audio:", e));
            } else {
                audioMotor.pause();
                btnParlante.innerHTML = "🔈";
                btnParlante.style.background = "#ff6600";
            }
        }
        async function cargarClips() { /* tu código */ }
        function toggle() { /* tu código */ }
        // ... resto sin cambios ...

        // 🔥 FIREBASE CONFIG (AQUÍ METES TUS DATOS PERSONALES)
        const firebaseConfig = {
            // 👈 AQUÍ PEGAS TU CONFIG DE FIREBASE
            apiKey: "AIza...",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto",
            // ... resto de tu config
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🔥 CHAT FIREBASE - FUNCIONES PRINCIPALES
        const btnChat = document.getElementById('btnChat');
        const chatContainer = document.getElementById('chat-container');
        const chatUl = document.getElementById('chatUl');
        let chatVisible = false;

        // Toggle chat (verde/abrir, rojo/cerrar)
        function toggleChat() {
            chatVisible = !chatVisible;
            if (chatVisible) {
                chatContainer.style.display = 'block';
                btnChat.innerHTML = '❌';
                btnChat.style.background = 'linear-gradient(45deg, #cc0000, #ff0000)';
                btnChat.style.boxShadow = '0 4px 15px rgba(204,0,0,0.4)';
            } else {
                chatContainer.style.display = 'none';
                btnChat.innerHTML = '💬';
                btnChat.style.background = 'linear-gradient(45deg, #00cc00, #00ff00)';
                btnChat.style.boxShadow = '0 4px 15px rgba(0,204,0,0.4)';
            }
        }

        // 🔥 ENVIAR MENSAJE A FIREBASE
        document.getElementById('btnEnviar').addEventListener('click', enviarMensaje);
        document.getElementById('mensaje').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });

        function enviarMensaje() {
            const nombre = document.getElementById('nombre').value.trim() || 'Anónimo';
            const mensaje = document.getElementById('mensaje').value.trim();

            if (!mensaje || mensaje.length < 2) return;

            // GUARDAR EN FIREBASE (misma colección que tu juego de toros)
            db.collection('mensajes_toros')  // 👈 CAMBIA POR TU COLECCIÓN REAL
                .add({
                    nombre: nombre,
                    mensaje: mensaje,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    plataforma: 'TAUROEMISION'  // para distinguir web vs juego
                })
                .then(() => {
                    document.getElementById('mensaje').value = '';
                    document.getElementById('nombre').focus();
                })
                .catch(error => {
                    console.error('Error enviando:', error);
                });
        }

        // 🔥 ESCUCHAR MENSAJES NUEVOS (EN TIEMPO REAL)
        db.collection('mensajes_toros')  // 👈 MISMA COLECCIÓN QUE EL JUEGO
            .orderBy('timestamp', 'desc')
            .limit(50)  // últimos 50 mensajes
            .onSnapshot(snapshot => {
                chatUl.innerHTML = '';  // limpiar y reordenar

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `<strong style="color: #ff6600;">${data.nombre}:</strong> ${data.mensaje}`;
                    chatUl.appendChild(li);
                });

                // Scroll al final
                chatUl.scrollTop = chatUl.scrollHeight;
            });

        // 🔥 TU RESTO DE CÓDIGO EXISTENTE (sin cambios)
        // cargarClips();
        // setInterval(leerSRS, 3000);
        // etc...
    </script>
</body>

</html>
