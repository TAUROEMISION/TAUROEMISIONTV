<!DOCTYPE html>
<html>

<head>
    <title>TAURO JUEGO</title>
    <style>
        body {
            margin: 0;

            overflow: hidden;
            background: #000;
        }
    </style>
</head>

<body>
    <!-- ⭐ TU JUEGO EXACTO -->
    <div id="juego-toros" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000;">

            <button id="btnMuteJuego" onclick="toggleSonidoJuego()" style="

                border-radius:50%; width:40px; height:40px; font-size:16px; cursor:pointer;">🔇</button>
            <button id="btnSonidoJuego" onclick="toggleSonidoJuego()" style="
                background:#00ff00; color:black; border:none; padding:8px 12px; 
                border-radius:50%; width:40px; height:40px; font-size:16px; 
                cursor:pointer; display:none;">🔊</button>
        </div>

        <!-- IFRAME TU JUEGO -->
        <iframe id="iframe-toros" style="
            width:100vw !important; height:100vh !important; position:fixed; 
            top:0; left:0; border:0; margin:0; padding:0; background:#000;
        " src="https://tauroemision.github.io/TAUROEMISIONGAME3WEB/" allowfullscreen
            allow="fullscreen; autoplay; accelerometer; gyroscope">
        </iframe>
    </div>

    </script>
</body>

</html>
