<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAURO🐂TV</title>
    <style>*{margin:0;background:#000;height:100vh;}video{width:100vw;height:100vh;object-fit:contain;}</style>
</head>
<body>
    <video id="video" autoplay muted playsinline controls crossorigin="anonymous"></video>
    
    <script>
        const video = document.getElementById('video');
        const url = 'https://soil-arise-alarm-numbers.trycloudflare.com/obs_directo';
        
        let ms, sb, fetching = false;
        
        function initMSE() {
            ms = new MediaSource();
            video.src = URL.createObjectURL(ms);
            
            ms.addEventListener('sourceopen', () => {
                sb = ms.addSourceBuffer('video/mp4; codecs="avc1.42E01E,mp4a.40.2"');
                sb.mode = 'sequence';  // 🔥 FIX ORDER
                
                sb.addEventListener('updateend', () => {
                    if (!fetching && !ms.ending) {
                        fetchData();  // 🔥 SOLO CUANDO ESTÁ LISTO
                    }
                });
                
                fetchData();  // Primera carga
            });
        }
        
        async function fetchData() {
            if (fetching || sb.updating || ms.readyState !== 'open') return;
            
            fetching = true;
            try {
                const response = await fetch(url);
                const reader = response.body.getReader();
                
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    // 🔥 ESPERA COLA
                    while (sb.updating) {
                        await new Promise(r => setTimeout(r, 50));
                    }
                    
                    sb.appendBuffer(value);
                }
            } catch(e) {
                console.log('Stream error, retrying...');
            } finally {
                fetching = false;
            }
        }
        
        video.addEventListener('play', initMSE);
        document.addEventListener('click', () => video.play());
    </script>
</body>
</html>
