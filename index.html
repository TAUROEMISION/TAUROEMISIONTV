<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Señal Oppo TAURO</title>
  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
  <style>
    *{margin:0;background:#000;height:100vh;}
    video{width:100vw;height:100vh;object-fit:contain;}
    #debug {position:fixed;top:10px;left:10px;color:#ff6600;font-family:monospace;font-size:12px;z-index:999;background:rgba(0,0,0,0.7);padding:10px;max-height:200px;overflow:auto;}
  </style>
</head>
<body>
  <video id="video" controls autoplay muted crossorigin="anonymous"></video>
  <div id="debug">🔄 Conectando SRS...</div>
  
  <script>
    const video = document.getElementById('video');
    const debug = document.getElementById('debug');
    
    function log(msg) {
      debug.innerHTML += `<br>${new Date().toLocaleTimeString()} ${msg}`;
      debug.scrollTop = debug.scrollHeight;
      console.log(msg);
    }
    
    if (flvjs.isSupported()) {
      log('🐂 flv.js soportado');
      
      const player = flvjs.createPlayer({
        type: 'flv',
        url: 'https://soil-arise-alarm-numbers.trycloudflare.com/live/directo',
        isLive: true,
        cors: true,
        enableWorker: false,
        enableStashBuffer: false,
        stashInitialSize: 384,
        autoCleanupSourceBuffer: true
      });
      
      // 🔥 EVENTOS DEBUG
      player.on(flvjs.Events.LOADING_COMPLETE, () => log('🐂 LOADED'));
      player.on(flvjs.Events.MEDIA_INFO, () => log('🐂 MEDIA INFO'));
      player.on(flvjs.Events.METADATA_ARRIVED, () => log('🐂 METADATA'));
      player.on(flvjs.Events.FRAME_BUFFERING, () => log('🐂 BUFFERING'));
      player.on(flvjs.Events.ERROR, (err) => log(`❌ ERROR: ${err}`));
      
      player.attachMediaElement(video);
      player.load();
      log('🚀 Player iniciado');
      
    } else {
      log('❌ flv.js NO soportado');
    }
    
    // ANTI-MUTE
    document.addEventListener('click', () => video.muted = false);
  </script>
</body>
</html>
