<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    
    <title>TAURO Normal TV</title>
    
    <link rel="icon" type="image/png" href="logo_tauro.png">
    <link rel="apple-touch-icon" href="logo_tauro.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff; z-index: 9999;
        }
        
        .logo-txt { font-size: 1.8em; font-weight: 900; color: #ff6600; letter-spacing: 1px; }
        .spinner { border: 4px solid rgba(255,102,0,0.2); border-top: 4px solid #ff6600; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* EL IFRAME AHORA ES TOTAL */
        #mainFrame { border: 0; width: 100vw; height: 100vh; display: none; }

        /* EL BOTÓN PARA PONERLO COMO EL JUEGO */
        #btn-full {
            position: fixed; bottom: 20px; right: 20px;
            background: #ff6600; color: white; border: none;
            padding: 15px; border-radius: 50%; z-index: 10000;
            display: none; font-size: 20px; box-shadow: 0 0 10px #000;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        <div class="logo-txt">TAUROEMISION</div>
        <div style="font-size: 1em; color: #ddd; margin-top: 5px;">TV LIVE</div>
        <div class="spinner"></div>
    </div>
    
    <button id="btn-full" onclick="ponloFull()">📺</button>

    <iframe id="mainFrame" src="" allow="autoplay; fullscreen"></iframe>

    <script>
        const miServidor = "https://feeling-vertical-shipped-detroit.trycloudflare.com";
        const frame = document.getElementById('mainFrame');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('btn-full');
        
        frame.src = miServidor;

        frame.onload = () => { 
            loading.style.display = 'none'; 
            frame.style.display = 'block';
            btn.style.display = 'block'; // Mostramos el botón para forzar el Full
        };

        function ponloFull() {
            if (frame.requestFullscreen) {
                frame.requestFullscreen();
            } else if (frame.webkitRequestFullscreen) {
                frame.webkitRequestFullscreen();
            }
        }

        setTimeout(() => {
            if (loading.style.display !== 'none') {
                loading.innerHTML = '<div style="color:#ff6600; font-size:2.5em;">⚠️</div><p>BUSCANDO SEÑAL...</p>';
            }
        }, 12000);
    </script>
</body>
</html>
