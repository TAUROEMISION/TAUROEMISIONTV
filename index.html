<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TAURO🐂TV SRS</title>
  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
  <style>
    *{margin:0;background:#000;height:100vh;}
    video{width:100vw;height:100vh;object-fit:contain;}
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline crossorigin="anonymous"></video>
  
  <script>
    if (flvjs.isSupported()) {
      const video = document.getElementById('video');
      const player = flvjs.createPlayer({
        type: 'flv',
        url: 'https://soil-arise-alarm-numbers.trycloudflare.com/live/directo',
        isLive: true,
        cors: true,
        enableWorker: false,      // LOW LATENCY
        enableStashBuffer: false, // 0 BUFFER
        stashInitialSize: 384
      });
      
      player.attachMediaElement(video);
      player.load();
      player.play();
      
      // 🔊 ANTI-MUTE
      document.addEventListener('click', () => video.muted = false);
    }
  </script>
</body>
</html>
