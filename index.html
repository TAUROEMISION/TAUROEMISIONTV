<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TAURO EMISIÓN - POWER TUNING</title>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Capa 1: El lienzo del Croma (CENTRADITO Y MÁS PEQUEÑO) */
        #canvasCroma {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40vw;
            /* Ajusta el tamaño aquí */
            height: auto;
            z-index: 10;
        }

        /* Capa 2: El Directo (WHEP) */
        whep-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .show-live {
            opacity: 1 !important;
        }

        /* LETREROS MÁGICOS */
        .letrero {
            position: absolute;
            width: 100%;
            text-align: center;
            z-index: 50;
            display: none;
            /* Se activa por JS */
            text-transform: uppercase;
        }

        #arriba {
            top: 10%;
            color: #ffff00;
            font-size: 7vw;
            text-shadow: 0 0 20px #f00, 0 0 40px rgb(119, 255, 0);
            animation: destello 0.8s infinite alternate;
        }

        #abajo {
            bottom: 10%;
            color: #ffffff;
            font-size: 6vw;
            text-shadow: 0 0 15px #ff0000;
            animation: latido 1.5s infinite;
        }

        /* ANIMACIONES */
        @keyframes destello {
            from {
                opacity: 0.7;
                filter: brightness(1);
            }

            to {
                opacity: 0.5;
                filter: brightness(2);
                transform: scale(1.05);
            }
        }

        @keyframes latido {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
                color: #ff0000;
            }
        }

        #videoOculto {
            display: none;
        }
    </style>
</head>

<body>

    <div id="arriba" class="letrero">¡CONEXIÓN PERDIDA!</div>
    <div id="abajo" class="letrero">¡TUS TOROS EN BREVE!</div>

    <canvas id="canvasCroma"></canvas>
    <video id="videoOculto" muted playsinline crossorigin="anonymous"></video>

    <whep-video id="mainPlayer" src="http://100.87.122.28:1985/rtc/v1/whep/?app=live&stream=livestream" autoplay
        playsinline></whep-video>

    <script src="https://unpkg.com/@eyevinn/whep-video-component@latest/dist/whep-video.component.js"></script>
    <script>
        // LISTA DE TUS 17 MP4
        const mp4List = ['toro1.mp4', 'toro2.mp4', 'toro3.mp4', 'toro4.mp4', 'toro5.mp4', 'toro6.mp4', 'toro7.mp4', 'toro8.mp4', 'toro9.mp4', 'toro10.mp4', 'toro11.mp4', 'toro12.mp4', 'toro13.mp4', 'toro14.mp4', 'toro15.mp4', 'toro16.mp4', 'toro17.mp4'];

        const video = document.getElementById('videoOculto');
        const canvas = document.getElementById('canvasCroma');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const whep = document.getElementById('mainPlayer');
        const letreros = document.querySelectorAll('.letrero');

        function procesarCroma() {
            if (video.paused || video.ended) return;

            // Mantenemos la resolución original del video para el procesado
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i + 1], b = data[i + 2];
                // Filtro Croma ajustado
                if (g > 90 && g > r * 1.3 && g > b * 1.3) {
                    data[i + 3] = 0;
                }
            }
            ctx.putImageData(frame, 0, 0);
            requestAnimationFrame(procesarCroma);
        }

        function siguienteToro() {
            const random = mp4List[Math.floor(Math.random() * mp4List.length)];
            video.src = random;
            video.play().catch(e => console.log("Esperando interacción..."));
        }

        video.onplay = () => requestAnimationFrame(procesarCroma);
        video.onended = siguienteToro;

        function vigilar() {
            if (whep.shadowRoot && whep.shadowRoot.querySelector('video')) {
                const v = whep.shadowRoot.querySelector('video');

                // CUANDO HAY SEÑAL
                v.onplaying = () => {
                    whep.classList.add('show-live');
                    letreros.forEach(l => l.style.display = 'none');
                    video.pause();
                };

                // CUANDO SE PIERDE LA SEÑAL
                v.onwaiting = () => {
                    whep.classList.remove('show-live');
                    letreros.forEach(l => l.style.display = 'block');
                    if (video.paused) siguienteToro();
                };
            }
        }

        setInterval(vigilar, 1000);
        // Empezamos con los letreros y toros visibles por si el directo tarda
        letreros.forEach(l => l.style.display = 'block');
        siguienteToro();
    </script>
</body>

</html>
