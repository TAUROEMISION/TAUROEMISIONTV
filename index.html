<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAURO🐂TV 60FPS</title>
    <style> body { margin:0; background:#000; } video { width:100vw; height:100vh; object-fit:contain; } </style>
</head>
<body>
    <video id="tauro-live" autoplay muted playsinline controls></video>
    
    <script>
        const video = document.getElementById('tauro-live');
        video.src = "https://soil-arise-alarm-numbers.trycloudflare.com/live/livestream";
        
        video.addEventListener('loadeddata', () => {
            video.muted = false;
            video.play();
        });
        
        document.addEventListener('click', () => video.muted = false);
    </script>
</body>
</html>
