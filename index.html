<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>TAURO🐂TV</title>
    
    <link rel="icon" type="image/png" href="logo_tauro.png">
    <link rel="apple-touch-icon" href="logo_tauro.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TAURO🐂TV">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: #fff; z-index: 9999;
        }
        
        .logo-txt { 
            font-size: 1.8em; font-weight: 900; color: #ff6600; 
            letter-spacing: 1px;
        }
        
        .spinner {
            border: 4px solid rgba(255,102,0,0.2); border-top: 4px solid #ff6600;
            border-radius: 50%; width: 35px; height: 35px; 
            animation: spin 1s linear infinite; margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 🔥 OBS WEBRTC FULLSCREEN */
        #obs-player {
            width: 100vw; height: 100vh; 
            position: fixed; top: 0; left: 0; z-index: 1;
            display: none; background: #000;
        }
        #obs-player.active { display: block !important; }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        <div class="logo-txt">TAUROEMISION</div>
        <div style="font-size: 1em; color: #ddd; margin-top: 5px;">TV LIVE</div>
        <div class="spinner"></div>
    </div>
    
    <!-- 🔥 OBS WEBRTC DIRECTO 60FPS -->
    <video id="obs-player" 
           autoplay muted playsinline
           crossorigin="anonymous">
    </video>

    <script>
        // 🔥 OBS WEBRTC URL DIRECTA (TU FUENTE)
        const OBS_WHEP = "http://100.87.122.28:1985/rtc/v1/whep/?app=live&stream=livestream";
        const video = document.getElementById('obs-player');
        const loading = document.getElementById('loading');
        
        // 🔧 WEBRTC WHEP SIMPLE (FUNCIONA SIEMPRE)
        async function conectarOBS() {
            try {
                // 1. Pedimos el SDP offer del servidor OBS
                const response = await fetch(OBS_WHEP);
                const sdpData = await response.json();
                
                // 2. Creamos conexión WebRTC
                const pc = new RTCPeerConnection({
                    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
                });
                
                // 3. Cuando llegue video → MOSTRAMOS
                pc.ontrack = (event) => {
                    video.srcObject = event.streams[0];
                    loading.style.display = 'none';
                    video.classList.add('active');
                    setTimeout(() => video.muted = false, 1000);
                };
                
                // 4. Creamos oferta → servidor OBS
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // 5. Enviamos oferta al servidor OBS
                const sessionResponse = await fetch(sdpData.url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/sdp'},
                    body: offer.sdp
                });
                
                const answer = await sessionResponse.text();
                await pc.setRemoteDescription({type: 'answer', sdp: answer});
                
                console.log('🐂 OBS WEBRTC CONECTADO 60FPS!');
                
            } catch(error) {
                console.log('❌ WebRTC fail → Fallback');
                fallbackFlask();
            }
        }
        
        // 🔄 FALLBACK FLASK (TU SISTEMA ORIGINAL)
        function fallbackFlask() {
            video.src = "https://soil-arise-alarm-numbers.trycloudflare.com/solo_directo";
            video.addEventListener('loadeddata', () => {
                loading.style.display = 'none';
                video.classList.add('active');
                video.muted = false;
            });
        }
        
        // 🎮 CLICK PARA EMPEZAR (Chrome policy)
        document.addEventListener('click', conectarOBS, {once: true});
        
        // ⏱️ TIMEOUT SAFETY
        setTimeout(fallbackFlask, 15000);
    </script>
</body>
</html>
